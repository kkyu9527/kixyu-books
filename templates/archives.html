<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|目录 · ${site.title}|">目录 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <th:block th:replace="~{fragments/site :: siteMark}"></th:block>
      <nav class="masthead-nav" aria-label="主要导航">
        <div class="masthead-nav-links">
          <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/archives')}" />
        </div>
        <div class="masthead-actions">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(true, true)}" />
        </div>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section
        class="catalog-page"
        th:with="featuredPosts=${postFinder.list({page: 1, size: 4, sort: {'spec.pinned,desc', 'spec.publishTime,desc', 'metadata.creationTimestamp,desc'}}).items},
                 dateFormat=${theme.config.article.global_time_format ?: 'yyyy.MM.dd'},
                 showListPublishTime=${theme.config.article.list_meta_items == null or #lists.contains(theme.config.article.list_meta_items, 'publish_time')},
                 showListOwner=${theme.config.article.list_meta_items != null and #lists.contains(theme.config.article.list_meta_items, 'owner')}"
      >
        <header class="book-heading">
          <!-- 目录页眉标题；如果你希望叫“章节目录”“全书目录”，修改这里即可。 -->
          <p class="page-label">全书目录</p>
          <h1 class="page-title">目录</h1>
        </header>

        <section class="catalog-featured" th:if="${not #lists.isEmpty(featuredPosts) and featuredPosts[0].spec.pinned}">
          <div class="catalog-featured-head">
            <p class="page-label" th:text="${theme.config.cover.featured_label ?: '卷首推荐'}">卷首推荐</p>
            <h2 class="catalog-featured-title" th:text="${theme.config.cover.featured_title ?: '本卷必读'}">本卷必读</h2>
          </div>

          <ol class="catalog-featured-list">
            <li class="catalog-featured-item" th:each="featuredPost, featuredPostStat : ${featuredPosts}" th:if="${featuredPost.spec.pinned}">
              <a class="catalog-featured-link" th:href="${featuredPost.status.permalink}">
                <span class="catalog-featured-order" th:text="${#numbers.formatInteger(featuredPostStat.count, 2)}">01</span>
                <div class="catalog-featured-body">
                  <strong class="catalog-featured-name" th:text="${featuredPost.spec.title}">推荐文章</strong>
                </div>
              </a>
            </li>
          </ol>
        </section>

        <!-- 目录内容来自 Halo 的归档数据，你后续只需要维护文章本身，不需要手写这里的列表。 -->
        <div class="catalog-groups" th:if="${archives.total gt 0}">
          <section class="catalog-section" th:each="archive : ${archives.items}">
            <div class="catalog-year">
              <h2 th:text="${archive.year}">2026</h2>
            </div>
            <div class="catalog-months">
              <section class="catalog-month" th:each="month : ${archive.months}">
                <h3 class="catalog-month-title" th:text="${month.month} + ' 月'">3 月</h3>
                <ol class="catalog-list">
                  <li class="catalog-item" th:each="post : ${month.posts}">
                    <a class="catalog-link" th:href="${post.status.permalink}">
                      <div class="catalog-item-body">
                        <span class="catalog-item-title" th:text="${post.spec.title}">章节标题</span>
                        <span
                          class="catalog-item-meta"
                          th:if="${showListOwner}"
                          th:text="${not #strings.isEmpty(post.owner.displayName) ? post.owner.displayName : post.owner.name}"
                        >
                          作者
                        </span>
                      </div>
                      <time
                        class="catalog-item-date"
                        th:if="${showListPublishTime}"
                        th:datetime="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}"
                        th:text="${#dates.format(post.spec.publishTime, dateFormat)}"
                      >
                        03.31
                      </time>
                    </a>
                  </li>
                </ol>
              </section>
            </div>
          </section>
        </div>

        <p class="empty-state" th:if="${archives.total == 0}">目录暂时为空。</p>

        <th:block th:replace="~{fragments/pagination :: bookPager(data=${archives}, ariaLabel='目录分页导航')}" />
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>
  </body>
</html>
