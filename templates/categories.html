<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|分类 · ${site.title}|">分类 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/categories')}" />
        <button type="button" class="theme-switch theme-switch--compact" data-theme-toggle aria-label="切换颜色模式">
          <span class="theme-switch-mark" aria-hidden="true"></span>
          <span class="theme-switch-text" data-theme-label>跟随系统</span>
        </button>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section class="catalog-page catalog-page--taxonomy">
        <header class="book-heading">
          <p class="page-label">分类</p>
          <h1 class="page-title">分类</h1>
        </header>

        <th:block th:with="categoryItems=${categories}">
          <p class="empty-state" th:if="${#lists.isEmpty(categoryItems)}">暂时还没有分类。</p>

          <th:block th:unless="${#lists.isEmpty(categoryItems)}">
            <th:block th:fragment="renderCategoryTree(items, depth)">
              <ul class="taxonomy-list" th:classappend="${depth gt 0 ? ' taxonomy-list--nested' : ''}">
                <li class="taxonomy-item" th:each="item : ${items}">
                  <a class="taxonomy-link" th:href="${item.status.permalink}">
                    <span class="taxonomy-name" th:text="${item.spec.displayName}">分类名称</span>
                    <span class="taxonomy-count" th:text="|${item.postCount} 篇|">0 篇</span>
                  </a>
                  <th:block th:if="${not #lists.isEmpty(item.children)}">
                    <th:block th:replace="~{::renderCategoryTree(items=${item.children}, depth=${depth + 1})}" />
                  </th:block>
                </li>
              </ul>
            </th:block>

            <th:block th:replace="~{::renderCategoryTree(items=${categoryItems}, depth=0)}" />
          </th:block>
        </th:block>
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>
  </body>
</html>
