<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|${singlePage.spec.title} · ${site.title}|">页面标题 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
    <script
      defer
      th:src="@{/assets/js/reader.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body
    class="theme-root"
    th:with="isPreface=${singlePage.metadata.name == 'preface' or #strings.contains(singlePage.status.permalink, '/preface')}"
  >
    <header class="page-masthead page-masthead--reader">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', singlePage.status.permalink)}" />
        <button type="button" class="theme-switch theme-switch--compact" data-theme-toggle aria-label="切换颜色模式">
          <span class="theme-switch-mark" aria-hidden="true"></span>
          <span class="theme-switch-text" data-theme-label>跟随系统</span>
        </button>
      </nav>
    </header>

    <main class="page-shell page-shell--reader" role="main">
      <article class="post-article page-article">
        <header class="post-header">
          <p class="page-label">页面</p>
          <h1 class="post-title" th:text="${singlePage.spec.title}">页面标题</h1>
        </header>

        <div class="post-content" data-reader-content th:utext="${singlePage.content.content}"></div>

        <div class="preface-actions" th:if="${isPreface}">
          <a class="button button--primary" th:href="@{/archives}">开始阅读</a>
        </div>

        <section id="comment" class="page-comment" th:if="${haloCommentEnabled}">
          <header class="page-comment-header">
            <p class="page-label">留言</p>
            <h2 class="page-comment-title">留下你的阅读回音</h2>
          </header>
          <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
        </section>
      </article>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--reader')}"></th:block>

    <nav class="quick-return" aria-label="快速返回" th:unless="${isPreface}">
      <a class="quick-return-link" th:href="@{/}">首页</a>
      <a class="quick-return-link" th:href="@{/archives}">目录</a>
    </nav>

    <div class="image-lightbox" data-reader-lightbox hidden aria-hidden="true">
      <button type="button" class="image-lightbox-close" data-reader-lightbox-close aria-label="关闭全屏图片">
        返回阅读
      </button>
      <figure class="image-lightbox-figure">
        <img class="image-lightbox-image" data-reader-lightbox-image alt="" />
        <figcaption class="image-lightbox-caption" data-reader-lightbox-caption></figcaption>
      </figure>
    </div>
  </body>
</html>
