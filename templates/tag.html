<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|${tag.spec.displayName} · 标签 · ${site.title}|">标签 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <th:block th:replace="~{fragments/site :: siteMark}"></th:block>
      <nav class="masthead-nav" aria-label="主要导航">
        <div class="masthead-nav-links">
          <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/tags')}" />
        </div>
        <div class="masthead-actions">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(false, true)}" />
        </div>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section
        class="catalog-page"
        th:with="dateFormat=${theme.config.article.global_time_format ?: 'yyyy.MM.dd'},
                 showListPublishTime=${theme.config.article.list_meta_items == null or #lists.contains(theme.config.article.list_meta_items, 'publish_time')},
                 showListOwner=${theme.config.article.list_meta_items != null and #lists.contains(theme.config.article.list_meta_items, 'owner')}"
      >
        <header class="book-heading">
          <p class="page-label">标签</p>
          <h1 class="page-title" th:text="${tag.spec.displayName}">标签名称</h1>
        </header>

        <ol class="chapter-list" th:if="${posts.total gt 0}">
          <li class="chapter-item" th:each="item : ${posts.items}">
            <a class="chapter-link" th:href="${item.status.permalink}">
              <div class="chapter-heading">
                <div class="chapter-heading-copy">
                  <span class="chapter-title" th:text="${item.spec.title}">文章标题</span>
                  <p
                    class="chapter-meta"
                    th:if="${showListOwner}"
                    th:text="${not #strings.isEmpty(item.owner.displayName) ? item.owner.displayName : item.owner.name}"
                  >
                    作者
                  </p>
                </div>
                <time
                  class="chapter-date"
                  th:if="${showListPublishTime}"
                  th:datetime="${#dates.format(item.spec.publishTime, 'yyyy-MM-dd')}"
                  th:text="${#dates.format(item.spec.publishTime, dateFormat)}"
                >
                  2026.03.31
                </time>
              </div>
              <p
                class="chapter-excerpt"
                th:if="${not #strings.isEmpty(item.status.excerpt)}"
                th:text="${item.status.excerpt}"
              >
                文章摘要
              </p>
            </a>
          </li>
        </ol>

        <p class="empty-state" th:if="${posts.total == 0}">这个标签下还没有文章。</p>

        <th:block th:replace="~{fragments/pagination :: bookPager(data=${posts}, ariaLabel='标签分页导航')}" />
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>

    <th:block th:replace="~{fragments/navigation :: quickReturn}" />
  </body>
</html>
