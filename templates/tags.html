<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <title th:text="|标签 · ${site.title}|">标签 · Kixyu Books</title>
    <link
      rel="stylesheet"
      th:href="@{/assets/css/main.css?v={version}(version=${theme.spec.version})}"
    />
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <a class="masthead-link" th:href="@{/archives}">目录</a>
        <a class="masthead-link" th:href="@{/categories}">分类</a>
        <a class="masthead-link is-current" th:href="@{/tags}">标签</a>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section class="catalog-page">
        <header class="book-heading">
          <p class="page-label">标签</p>
          <h1 class="page-title">标签</h1>
        </header>

        <th:block th:with="tagItems=${tags}">
          <p class="empty-state" th:if="${#lists.isEmpty(tagItems)}">暂时还没有标签。</p>

          <div class="tag-cloud" th:unless="${#lists.isEmpty(tagItems)}">
            <a class="tag-chip" th:each="item : ${tagItems}" th:href="${item.status.permalink}" th:text="${item.spec.displayName}">
              标签名称
            </a>
          </div>
        </th:block>
      </section>
    </main>

    <footer class="site-footer site-footer--wide">
      <halo:footer />
    </footer>
  </body>
</html>
