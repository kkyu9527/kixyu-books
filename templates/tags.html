<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|标签 · ${site.title}|">标签 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <div class="masthead-nav-links">
          <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/tags')}" />
        </div>
        <div class="masthead-actions">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(false, true)}" />
        </div>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section class="catalog-page catalog-page--tags">
        <header class="book-heading">
          <p class="page-label">标签</p>
          <h1 class="page-title">标签</h1>
        </header>

        <th:block th:with="tagItems=${tags}">
          <p class="empty-state" th:if="${#lists.isEmpty(tagItems)}">暂时还没有标签。</p>

          <div class="tag-cloud" th:unless="${#lists.isEmpty(tagItems)}">
            <a class="tag-chip" th:each="item : ${tagItems}" th:href="${item.status.permalink}">
              <span class="tag-chip-name" th:text="${item.spec.displayName}">标签名称</span>
              <span class="tag-chip-count" th:text="|${item.postCount} 篇|">0 篇</span>
            </a>
          </div>
        </th:block>
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>
  </body>
</html>
