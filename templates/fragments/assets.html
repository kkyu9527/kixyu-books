<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org">
  <th:block th:fragment="themeBoot(version)">
    <script th:inline="javascript">
      (() => {
        const root = document.documentElement;
        const storageKey = "kb-color-scheme-mode";
        const fallback = /*[[${theme.config.style.color_scheme}]]*/ "system";
        const allowToggleConfig = /*[[${theme.config.style.enable_change_color_scheme}]]*/ true;
        const customColorsEnabled =
          /*[[${theme.config.style.enable_custom_colors == true or theme.config.style.enable_custom_colors == 'true'}]]*/ false;
        const lightThemeColor =
          customColorsEnabled
            ? /*[[${#strings.defaultString(theme.config.style.custom_palette != null and theme.config.style.custom_palette.light != null ? theme.config.style.custom_palette.light.site_background : '', '#f4efe6')}]]*/ "#f4efe6"
            : "#f4efe6";
        const darkThemeColor =
          customColorsEnabled
            ? /*[[${#strings.defaultString(theme.config.style.custom_palette != null and theme.config.style.custom_palette.dark != null ? theme.config.style.custom_palette.dark.site_background : '', '#15110d')}]]*/ "#15110d"
            : "#15110d";
        const normalizeFlag = (value, fallbackValue) => {
          if (typeof value === "boolean") {
            return value;
          }

          if (typeof value === "string") {
            const normalized = value.trim().toLowerCase();

            if (normalized === "true" || normalized === "1") {
              return true;
            }

            if (normalized === "false" || normalized === "0" || normalized === "") {
              return false;
            }
          }

          if (typeof value === "number") {
            return value !== 0;
          }

          return typeof fallbackValue === "boolean" ? fallbackValue : Boolean(value);
        };
        const allowToggle = normalizeFlag(allowToggleConfig, true);
        const preferredMode =
          fallback === "light" || fallback === "dark" || fallback === "system" ? fallback : "system";
        const stored = allowToggle ? localStorage.getItem(storageKey) : null;
        const mode = stored === "light" || stored === "dark" || stored === "system" ? stored : preferredMode;

        const scheme =
          mode === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');

        root.dataset.colorSchemeMode = mode;
        root.dataset.colorScheme = scheme;
        root.dataset.themeToggleEnabled = allowToggle ? "true" : "false";
        root.dataset.themeColorLight = lightThemeColor;
        root.dataset.themeColorDark = darkThemeColor;

        if (metaThemeColor) {
          metaThemeColor.setAttribute("content", scheme === "dark" ? darkThemeColor : lightThemeColor);
        }
      })();
    </script>
    <th:block th:replace="~{::themeStyles(${version})}"></th:block>
  </th:block>

  <th:block th:fragment="themeStyles(version)">
    <style>
:root {
  --kb-font-body: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
}
    </style>
    <style
      th:if="${theme.config.style.enable_custom_colors == true or theme.config.style.enable_custom_colors == 'true'}"
      th:inline="css"
      th:with="palette=${theme.config.style.custom_palette},
               lightPalette=${palette != null ? palette.light : null},
               darkPalette=${palette != null ? palette.dark : null}"
    >
:root {
  --kb-custom-light-site-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.site_background : '', '#f4efe6')})];
  --kb-custom-light-page-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.page_background : '', 'rgba(255, 251, 245, 0.82)')})];
  --kb-custom-light-article-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.article_background : '', 'rgba(255, 251, 245, 0.82)')})];
  --kb-custom-light-panel-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.panel_background : '', 'rgba(255, 251, 245, 0.92)')})];
  --kb-custom-light-control-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.control_background : '', 'rgba(255, 255, 255, 0.52)')})];
  --kb-custom-light-control-hover-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.control_hover_background : '', 'rgba(255, 255, 255, 0.82)')})];
  --kb-custom-light-float-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.float_background : '', 'rgba(255, 251, 245, 0.8)')})];
  --kb-custom-light-float-hover-background: [(${#strings.defaultString(lightPalette != null ? lightPalette.float_hover_background : '', 'rgba(255, 255, 255, 0.9)')})];
  --kb-custom-light-accent: [(${#strings.defaultString(lightPalette != null ? lightPalette.accent : '', '#2f2418')})];
  --kb-custom-light-accent-contrast: [(${#strings.defaultString(lightPalette != null ? lightPalette.accent_contrast : '', '#f8f2e8')})];
  --kb-custom-light-accent-soft: [(${#strings.defaultString(lightPalette != null ? lightPalette.accent_soft : '', 'rgba(47, 36, 24, 0.08)')})];
  --kb-custom-light-border: [(${#strings.defaultString(lightPalette != null ? lightPalette.border : '', 'rgba(61, 48, 34, 0.14)')})];
  --kb-custom-light-overlay: [(${#strings.defaultString(lightPalette != null ? lightPalette.overlay : '', 'rgba(19, 14, 10, 0.3)')})];
  --kb-custom-light-primary-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.primary_text : '', '#221c15')})];
  --kb-custom-light-secondary-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.secondary_text : '', '#6b6258')})];
  --kb-custom-light-body-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.body_text : '', '#221c15')})];
  --kb-custom-light-heading-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.heading_text : '', '#221c15')})];
  --kb-custom-light-list-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.list_text : '', '#221c15')})];
  --kb-custom-light-strong-text: [(${#strings.defaultString(lightPalette != null ? lightPalette.strong_text : '', '#221c15')})];
  --kb-custom-dark-site-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.site_background : '', '#15110d')})];
  --kb-custom-dark-page-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.page_background : '', 'rgba(28, 22, 18, 0.84)')})];
  --kb-custom-dark-article-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.article_background : '', 'rgba(28, 22, 18, 0.84)')})];
  --kb-custom-dark-panel-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.panel_background : '', 'rgba(31, 24, 20, 0.94)')})];
  --kb-custom-dark-control-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.control_background : '', 'rgba(255, 248, 238, 0.08)')})];
  --kb-custom-dark-control-hover-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.control_hover_background : '', 'rgba(255, 248, 238, 0.14)')})];
  --kb-custom-dark-float-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.float_background : '', 'rgba(31, 24, 20, 0.88)')})];
  --kb-custom-dark-float-hover-background: [(${#strings.defaultString(darkPalette != null ? darkPalette.float_hover_background : '', 'rgba(41, 31, 25, 0.94)')})];
  --kb-custom-dark-accent: [(${#strings.defaultString(darkPalette != null ? darkPalette.accent : '', '#efe3d0')})];
  --kb-custom-dark-accent-contrast: [(${#strings.defaultString(darkPalette != null ? darkPalette.accent_contrast : '', '#1d1510')})];
  --kb-custom-dark-accent-soft: [(${#strings.defaultString(darkPalette != null ? darkPalette.accent_soft : '', 'rgba(239, 227, 208, 0.08)')})];
  --kb-custom-dark-border: [(${#strings.defaultString(darkPalette != null ? darkPalette.border : '', 'rgba(243, 235, 223, 0.12)')})];
  --kb-custom-dark-overlay: [(${#strings.defaultString(darkPalette != null ? darkPalette.overlay : '', 'rgba(8, 6, 4, 0.52)')})];
  --kb-custom-dark-primary-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.primary_text : '', '#f3ebdf')})];
  --kb-custom-dark-secondary-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.secondary_text : '', '#b8ab99')})];
  --kb-custom-dark-body-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.body_text : '', '#f3ebdf')})];
  --kb-custom-dark-heading-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.heading_text : '', '#f3ebdf')})];
  --kb-custom-dark-list-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.list_text : '', '#f3ebdf')})];
  --kb-custom-dark-strong-text: [(${#strings.defaultString(darkPalette != null ? darkPalette.strong_text : '', '#f3ebdf')})];
}
    </style>
    <style
      th:if="${theme.config.style.enable_custom_font != null and theme.config.style.enable_custom_font and not #strings.isEmpty(theme.config.style.custom_font)}"
      th:inline="text"
    >
@font-face {
  font-family: "KB Custom Serif";
  src: url("[(${theme.config.style.custom_font})]");
  font-display: swap;
}

:root {
  --kb-font-body: "KB Custom Serif", "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
}
    </style>
    <link rel="stylesheet" th:href="@{/assets/css/base.css?v={version}(version=${version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/catalog.css?v={version}(version=${version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/reader.css?v={version}(version=${version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/components.css?v={version}(version=${version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/motion.css?v={version}(version=${version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css?v={version}(version=${version})}" />
  </th:block>
</html>
