<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|瞬间 · ${site.title}|">瞬间 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <div class="masthead-nav-links">
          <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/moments')}" />
        </div>
        <div class="masthead-actions">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(true, true)}" />
        </div>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section class="catalog-page">
        <header class="book-heading">
          <p class="page-label">附录</p>
          <h1 class="page-title">瞬间</h1>
        </header>

        <nav class="media-filter" aria-label="瞬间标签">
          <a
            class="media-filter-link"
            th:classappend="${#lists.isEmpty(param.tag) ? ' is-current' : ''}"
            th:href="@{/moments}"
          >
            全部
          </a>
          <a
            class="media-filter-link"
            th:each="tag : ${tags}"
            th:href="@{|/moments?tag=${tag.name}|}"
            th:classappend="${#lists.contains(param.tag, tag.name) ? ' is-current' : ''}"
          >
            <span th:text="|#${tag.name}|">#标签</span>
            <span th:text="| ${tag.momentCount}|"> 0</span>
          </a>
        </nav>

        <p class="empty-state" th:if="${moments.total == 0}">暂时还没有新的片段。</p>

        <ol class="moment-list" th:if="${moments.total gt 0}">
          <li class="moment-item" th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">
            <article class="moment-card">
              <header class="moment-header">
                <img
                  class="moment-avatar"
                  th:src="${moment.owner.avatar ?: site.logo ?: theme.spec.logo}"
                  th:alt="${moment.owner.displayName}"
                />
                <div>
                  <p class="moment-author" th:text="${moment.owner.displayName}">作者</p>
                  <p class="moment-date" th:text="${#dates.format(moment.spec.releaseTime, 'yyyy.MM.dd')}">2026.04.01</p>
                </div>
              </header>

              <div class="moment-body" th:utext="${content.html}"></div>

              <div class="moment-media" th:unless="${#lists.isEmpty(moment.spec.content.medium)}">
                <a
                  class="moment-media-item"
                  th:each="media : ${moment.spec.content.medium}"
                  th:if="${#strings.equals(media.type, 'PHOTO')}"
                  th:href="${media.url}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img
                    class="moment-media-image"
                    th:src="${media.url}"
                    th:srcset="|${thumbnail.gen(media.url, 's')} 400w,
                                ${thumbnail.gen(media.url, 'm')} 800w,
                                ${thumbnail.gen(media.url, 'l')} 1200w|"
                    sizes="(max-width: 1200px) 100vw, 1200px"
                    alt=""
                  />
                </a>
              </div>
            </article>
          </li>
        </ol>

        <nav class="pager" th:if="${moments.hasPrevious() or moments.hasNext()}">
          <a class="pager-link" th:if="${moments.hasPrevious()}" th:href="${moments.prevUrl}">上一页</a>
          <span class="pager-current" th:text="|第 ${moments.page} / ${moments.totalPages} 页|">第 1 / 1 页</span>
          <a class="pager-link" th:if="${moments.hasNext()}" th:href="${moments.nextUrl}">下一页</a>
        </nav>
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>

    <th:block th:replace="~{fragments/navigation :: quickReturn}" />
  </body>
</html>
