<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="|友情链接 · ${site.title}|">友情链接 · Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root">
    <header class="page-masthead page-masthead--wide">
      <a class="site-mark" th:href="@{/}" th:text="${site.title}">Kixyu Books</a>
      <nav class="masthead-nav" aria-label="主要导航">
        <div class="masthead-nav-links">
          <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('masthead-link', '/links')}" />
        </div>
        <div class="masthead-actions">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(true, true)}" />
        </div>
      </nav>
    </header>

    <main class="page-shell page-shell--wide" role="main">
      <section class="catalog-page">
        <header class="book-heading">
          <p class="page-label">附录</p>
          <h1 class="page-title">友情链接</h1>
        </header>

        <p class="empty-state" th:if="${#lists.isEmpty(groups)}">暂时还没有收录链接。</p>

        <div class="link-groups" th:unless="${#lists.isEmpty(groups)}">
          <section class="link-group" th:each="group : ${groups}">
            <h2 class="link-group-title" th:text="${group.spec.displayName}">常去之地</h2>
            <div class="link-card-list">
              <a
                class="link-card"
                th:each="link : ${group.links}"
                th:href="${link.spec.url}"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  class="link-card-logo"
                  th:src="${link.spec.logo ?: site.logo ?: theme.spec.logo}"
                  th:alt="${link.spec.displayName}"
                />
                <div class="link-card-copy">
                  <p class="link-card-title" th:text="${link.spec.displayName}">站点名称</p>
                  <p class="link-card-description" th:text="${link.spec.description}">站点简介</p>
                </div>
              </a>
            </div>
          </section>
        </div>
      </section>
    </main>

    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--wide')}"></th:block>

    <th:block th:replace="~{fragments/navigation :: quickReturn}" />
  </body>
</html>
