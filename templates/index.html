<!DOCTYPE html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:halo="https://www.halo.run"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
    <meta name="theme-color" content="#f4efe6" />
    <title th:text="${site.title}">Kixyu Books</title>
    <th:block th:replace="~{fragments/assets :: themeBoot(${theme.spec.version})}"></th:block>
    <script
      defer
      th:src="@{/assets/js/theme.js?v={version}(version=${theme.spec.version})}"
    ></script>
  </head>
  <body class="theme-root theme-cover">
    <main class="cover-page" role="main">
      <section class="cover-card">
        <div class="cover-tools">
          <th:block th:replace="~{fragments/navigation :: headerUtilities(false, false)}" />
        </div>
        <div class="cover-copy">
          <!-- 封面页角标文案；如果你后续想换成“序章”“卷首”等，可直接修改这里。 -->
          <p class="cover-mark" th:text="${theme.config.cover.mark_text ?: '扉页'}">扉页</p>
          <!-- 封面主标题默认读取站点标题；如需固定文案，可改为你自己的文本。 -->
          <h1 class="cover-title" th:text="${theme.config.cover.title_text ?: site.title}">Kixyu Books</h1>
          <!-- 封面副标题默认读取站点副标题；如需固定引言或主题说明，可在这里替换。 -->
          <p
            class="cover-subtitle"
            th:if="${not #strings.isEmpty(theme.config.cover.subtitle_text ?: site.subtitle)}"
            th:text="${theme.config.cover.subtitle_text ?: site.subtitle}"
          >
            A quiet place for reading.
          </p>
          <p class="cover-note" th:if="${not #strings.isEmpty(theme.config.cover.note_text)}" th:text="${theme.config.cover.note_text}">
            卷首说明
          </p>
        </div>
        <div class="cover-actions">
          <div class="cover-entry">
            <!-- 主入口按钮，默认进入序页。 -->
            <a class="cover-entry-link" th:href="@{/preface}">
              <span class="cover-entry-title" th:text="${theme.config.cover.preface_entry_title ?: '序'}">序</span>
              <span class="cover-entry-note" th:text="${theme.config.cover.preface_entry_note ?: '从卷首进入，先读第一段话。'}">
                从卷首进入，先读第一段话。
              </span>
            </a>
            <!-- 目录入口，作为首页主按钮。 -->
            <a
              class="button button--primary cover-entry-button"
              th:href="@{/archives}"
              th:text="${theme.config.cover.archive_entry_button_text ?: '开始阅读'}"
            >
              开始阅读
            </a>
          </div>
          <nav class="cover-index" aria-label="主菜单">
            <th:block th:replace="~{fragments/navigation :: primaryMenuLinks('cover-index-link', '')}" />
          </nav>
        </div>
      </section>
    </main>
    <th:block th:replace="~{fragments/footer :: siteFooter('site-footer site-footer--cover')}"></th:block>
  </body>
</html>
