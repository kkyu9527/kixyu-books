apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: kixyu-books
spec:
  displayName: Kixyu Books
  author:
    name: "Kixyu"
    website: "https://kixyu9527.com"
  description: "极简风格的博客主题，类似于阅读器界面。"
  logo: "https://oss.kixyu9527.com/blog/20251112/28553923-55C5-46A3-B738-E6769A0BDEEB.png"
  homepage: "https://example.com"
  # 填写主题源码仓库地址，必须是完整 URL。
