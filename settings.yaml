apiVersion: v1alpha1
kind: Setting
metadata:
  name: kixyu-books-setting
spec:
  forms:
    - group: style
      label: 样式
      formSchema:
        - $formkit: select
          name: color_scheme
          label: 默认配色
          value: system
          options:
            - label: 跟随系统
              value: system
            - label: 深色
              value: dark
            - label: 浅色
              value: light
        - $formkit: checkbox
          name: enable_change_color_scheme
          label: 允许访客切换配色
          value: true
        - $formkit: attachment
          name: night_logo
          aspectRatio: 8/3
          width: 160px
          accepts:
            - "image/*"
          label: 黑暗模式 Logo
          help: 深色模式下显示的站点标识，不填写时沿用站点 Logo。
        - $formkit: checkbox
          name: enable_custom_font
          label: 启用自定义字体
          value: false
          help: 开启后使用下方配置的字体文件地址。
        - $formkit: text
          name: custom_font
          label: 字体文件地址
          help: 支持 woff2、woff、ttf、eot、svg，建议优先使用 woff2。
        - $formkit: toggle
          id: enable_custom_colors_toggle
          name: enable_custom_colors
          label: 配色模式
          value: false
          renderType: text
          help: 选择“恢复默认”会立即回到当前主题内置颜色，不需要手动清空下面的字段。
          options:
            - label: 恢复默认
              value: false
              render: 恢复默认
            - label: 自定义配色
              value: true
              render: 自定义配色
        - $formkit: toggle
          id: palette_editor_scheme_toggle
          if: "$get(enable_custom_colors_toggle).value === true"
          name: palette_editor_scheme
          label: 当前编辑
          value: light
          renderType: text
          help: 为了避免配置项过长，这里一次只显示浅色或深色中的一组颜色。
          options:
            - label: 浅色模式
              value: light
              render: 浅色
            - label: 深色模式
              value: dark
              render: 深色
        - $formkit: group
          if: "$get(enable_custom_colors_toggle).value === true"
          name: custom_palette
          label: 配色编辑器
          children:
            - $formkit: group
              if: "$get(palette_editor_scheme_toggle).value === 'light'"
              name: light
              label: 浅色模式
              children:
                - $formkit: group
                  name: surface
                  label: 背景与层次
                  children:
                    - $formkit: color
                      name: site_background_picker
                      label: 网站背景
                    - $formkit: text
                      name: site_background_value
                      label: 网站背景 CSS 值
                      placeholder: 例如 #f4efe6、rgb(244, 239, 230) 或 rgba(255, 251, 245, 0.82)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: page_background_picker
                      label: 页面卡片背景
                    - $formkit: text
                      name: page_background_value
                      label: 页面卡片背景 CSS 值
                      placeholder: 例如 #f4efe6、rgb(244, 239, 230) 或 rgba(255, 251, 245, 0.82)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: article_background_picker
                      label: 文章页背景
                    - $formkit: text
                      name: article_background_value
                      label: 文章页背景 CSS 值
                      placeholder: 例如 #f4efe6、rgb(244, 239, 230) 或 rgba(255, 251, 245, 0.82)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: panel_background_picker
                      label: 强层级面板背景
                    - $formkit: text
                      name: panel_background_value
                      label: 强层级面板 CSS 值
                      placeholder: 例如 #f4efe6、rgb(244, 239, 230) 或 rgba(255, 251, 245, 0.92)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: control_background_picker
                      label: 控件背景
                    - $formkit: text
                      name: control_background_value
                      label: 控件背景 CSS 值
                      placeholder: 例如 #ffffff、rgb(255, 255, 255) 或 rgba(255, 255, 255, 0.52)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: control_hover_background_picker
                      label: 控件悬浮背景
                    - $formkit: text
                      name: control_hover_background_value
                      label: 控件悬浮背景 CSS 值
                      placeholder: 例如 #ffffff、rgb(255, 255, 255) 或 rgba(255, 255, 255, 0.82)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: float_background_picker
                      label: 浮层背景
                    - $formkit: text
                      name: float_background_value
                      label: 浮层背景 CSS 值
                      placeholder: 例如 #f4efe6、rgb(244, 239, 230) 或 rgba(255, 251, 245, 0.80)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: float_hover_background_picker
                      label: 浮层悬浮背景
                    - $formkit: text
                      name: float_hover_background_value
                      label: 浮层悬浮背景 CSS 值
                      placeholder: 例如 #ffffff、rgb(255, 255, 255) 或 rgba(255, 255, 255, 0.90)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_picker
                      label: 强调色
                    - $formkit: text
                      name: accent_value
                      label: 强调色 CSS 值
                      placeholder: 例如 #2f2418 或 rgb(47, 36, 24)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_contrast_picker
                      label: 强调色文字颜色
                    - $formkit: text
                      name: accent_contrast_value
                      label: 强调色文字 CSS 值
                      placeholder: 例如 #f8f2e8 或 rgb(248, 242, 232)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_soft_picker
                      label: 弱强调背景
                    - $formkit: text
                      name: accent_soft_value
                      label: 弱强调背景 CSS 值
                      placeholder: 例如 rgba(47, 36, 24, 0.08)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: border_picker
                      label: 边框颜色
                    - $formkit: text
                      name: border_value
                      label: 边框颜色 CSS 值
                      placeholder: 例如 rgba(61, 48, 34, 0.14)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: overlay_picker
                      label: 遮罩背景
                    - $formkit: text
                      name: overlay_value
                      label: 遮罩背景 CSS 值
                      placeholder: 例如 rgba(19, 14, 10, 0.30)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                - $formkit: group
                  name: text
                  label: 文字颜色
                  children:
                    - $formkit: color
                      name: primary_text_picker
                      label: 主文字颜色
                    - $formkit: text
                      name: primary_text_value
                      label: 主文字 CSS 值
                      placeholder: 例如 #221c15 或 rgb(34, 28, 21)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: secondary_text_picker
                      label: 次级文字颜色
                    - $formkit: text
                      name: secondary_text_value
                      label: 次级文字 CSS 值
                      placeholder: 例如 #6b6258 或 rgb(107, 98, 88)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: body_text_picker
                      label: 正文颜色
                    - $formkit: text
                      name: body_text_value
                      label: 正文 CSS 值
                      placeholder: 例如 #221c15 或 rgb(34, 28, 21)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: heading_text_picker
                      label: 多级标题颜色
                    - $formkit: text
                      name: heading_text_value
                      label: 多级标题 CSS 值
                      placeholder: 例如 #221c15 或 rgb(34, 28, 21)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: list_text_picker
                      label: 列表颜色
                    - $formkit: text
                      name: list_text_value
                      label: 列表 CSS 值
                      placeholder: 例如 #221c15 或 rgb(34, 28, 21)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: strong_text_picker
                      label: 加粗文字颜色
                    - $formkit: text
                      name: strong_text_value
                      label: 加粗文字 CSS 值
                      placeholder: 例如 #221c15 或 rgb(34, 28, 21)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
            - $formkit: group
              if: "$get(palette_editor_scheme_toggle).value === 'dark'"
              name: dark
              label: 深色模式
              children:
                - $formkit: group
                  name: surface
                  label: 背景与层次
                  children:
                    - $formkit: color
                      name: site_background_picker
                      label: 网站背景
                    - $formkit: text
                      name: site_background_value
                      label: 网站背景 CSS 值
                      placeholder: 例如 #15110d、rgb(21, 17, 13) 或 rgba(31, 24, 20, 0.94)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: page_background_picker
                      label: 页面卡片背景
                    - $formkit: text
                      name: page_background_value
                      label: 页面卡片背景 CSS 值
                      placeholder: 例如 #15110d、rgb(21, 17, 13) 或 rgba(28, 22, 18, 0.84)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: article_background_picker
                      label: 文章页背景
                    - $formkit: text
                      name: article_background_value
                      label: 文章页背景 CSS 值
                      placeholder: 例如 #15110d、rgb(21, 17, 13) 或 rgba(28, 22, 18, 0.84)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: panel_background_picker
                      label: 强层级面板背景
                    - $formkit: text
                      name: panel_background_value
                      label: 强层级面板 CSS 值
                      placeholder: 例如 #1f1814、rgb(31, 24, 20) 或 rgba(31, 24, 20, 0.94)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: control_background_picker
                      label: 控件背景
                    - $formkit: text
                      name: control_background_value
                      label: 控件背景 CSS 值
                      placeholder: 例如 rgba(255, 248, 238, 0.08)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: control_hover_background_picker
                      label: 控件悬浮背景
                    - $formkit: text
                      name: control_hover_background_value
                      label: 控件悬浮背景 CSS 值
                      placeholder: 例如 rgba(255, 248, 238, 0.14)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: float_background_picker
                      label: 浮层背景
                    - $formkit: text
                      name: float_background_value
                      label: 浮层背景 CSS 值
                      placeholder: 例如 rgba(31, 24, 20, 0.88)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: float_hover_background_picker
                      label: 浮层悬浮背景
                    - $formkit: text
                      name: float_hover_background_value
                      label: 浮层悬浮背景 CSS 值
                      placeholder: 例如 rgba(41, 31, 25, 0.94)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_picker
                      label: 强调色
                    - $formkit: text
                      name: accent_value
                      label: 强调色 CSS 值
                      placeholder: 例如 #efe3d0 或 rgb(239, 227, 208)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_contrast_picker
                      label: 强调色文字颜色
                    - $formkit: text
                      name: accent_contrast_value
                      label: 强调色文字 CSS 值
                      placeholder: 例如 #1d1510 或 rgb(29, 21, 16)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: accent_soft_picker
                      label: 弱强调背景
                    - $formkit: text
                      name: accent_soft_value
                      label: 弱强调背景 CSS 值
                      placeholder: 例如 rgba(239, 227, 208, 0.08)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: border_picker
                      label: 边框颜色
                    - $formkit: text
                      name: border_value
                      label: 边框颜色 CSS 值
                      placeholder: 例如 rgba(243, 235, 223, 0.12)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                    - $formkit: color
                      name: overlay_picker
                      label: 遮罩背景
                    - $formkit: text
                      name: overlay_value
                      label: 遮罩背景 CSS 值
                      placeholder: 例如 rgba(8, 6, 4, 0.52)
                      help: 支持透明色与 rgba()，填写时优先于上方色盘。
                - $formkit: group
                  name: text
                  label: 文字颜色
                  children:
                    - $formkit: color
                      name: primary_text_picker
                      label: 主文字颜色
                    - $formkit: text
                      name: primary_text_value
                      label: 主文字 CSS 值
                      placeholder: 例如 #f3ebdf 或 rgb(243, 235, 223)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: secondary_text_picker
                      label: 次级文字颜色
                    - $formkit: text
                      name: secondary_text_value
                      label: 次级文字 CSS 值
                      placeholder: 例如 #b8ab99 或 rgb(184, 171, 153)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: body_text_picker
                      label: 正文颜色
                    - $formkit: text
                      name: body_text_value
                      label: 正文 CSS 值
                      placeholder: 例如 #f3ebdf 或 rgb(243, 235, 223)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: heading_text_picker
                      label: 多级标题颜色
                    - $formkit: text
                      name: heading_text_value
                      label: 多级标题 CSS 值
                      placeholder: 例如 #f3ebdf 或 rgb(243, 235, 223)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: list_text_picker
                      label: 列表颜色
                    - $formkit: text
                      name: list_text_value
                      label: 列表 CSS 值
                      placeholder: 例如 #f3ebdf 或 rgb(243, 235, 223)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
                    - $formkit: color
                      name: strong_text_picker
                      label: 加粗文字颜色
                    - $formkit: text
                      name: strong_text_value
                      label: 加粗文字 CSS 值
                      placeholder: 例如 #f3ebdf 或 rgb(243, 235, 223)
                      help: 支持 #111111、rgb()、rgba() 等格式，填写时优先于上方色盘。
    - group: cover
      label: 扉页与卷首
      formSchema:
        - $formkit: text
          name: mark_text
          label: 扉页角标
          value: 扉页
        - $formkit: text
          name: title_text
          label: 扉页标题
          help: 不填写时默认使用站点标题。
        - $formkit: textarea
          name: subtitle_text
          label: 扉页副标题
          rows: 3
          help: 不填写时默认使用站点副标题。
        - $formkit: textarea
          name: note_text
          label: 卷首说明
          rows: 3
          help: 用于展示一句安静的卷首短句或编者按。
        - $formkit: text
          name: preface_entry_title
          label: 序入口标题
          value: 序
        - $formkit: textarea
          name: preface_entry_note
          label: 序入口说明
          rows: 2
          value: 从卷首进入，先读第一段话。
        - $formkit: text
          name: archive_entry_button_text
          label: 首页主按钮文案
          value: 开始阅读
        - $formkit: text
          name: preface_button_text
          label: 序页按钮文案
          value: 进入目录
        - $formkit: text
          name: featured_label
          label: 卷首推荐角标
          value: 卷首推荐
        - $formkit: text
          name: featured_title
          label: 卷首推荐标题
          value: 本卷必读
    - group: article
      label: 文章与时间
      formSchema:
        - $formkit: text
          name: global_time_format
          label: 全局时间格式
          value: yyyy.MM.dd
          help: 例如 yyyy.MM.dd、yyyy-MM-dd、yyyy年MM月dd日。
        - $formkit: select
          name: list_meta_items
          label: 文章列表元信息
          multiple: true
          clearable: true
          searchable: false
          value:
            - publish_time
          help: 控制目录页、分类页、标签页的安静元信息展示。
          options:
            - value: publish_time
              label: 发布日期
            - value: owner
              label: 作者
        - $formkit: select
          name: detail_meta_items
          label: 文章详情元信息
          multiple: true
          clearable: true
          searchable: false
          value:
            - publish_time
            - read_time
            - owner
          help: 仅保留发布日期、阅读时长、作者这三类安静信息。
          options:
            - value: publish_time
              label: 发布日期
            - value: read_time
              label: 阅读时长
            - value: owner
              label: 作者
        - $formkit: select
          name: post_navigation_scope
          label: 文章末尾前后篇范围
          value: global
          help: 选择按全站文章顺序，或仅按当前文章所属的第一个分类来计算上一篇和下一篇。
          options:
            - value: global
              label: 全站
            - value: category
              label: 同分类
    - group: navigation
      label: 导航
      formSchema:
        - $formkit: checkbox
          name: enable_mobile_nav_drawer
          label: 启用移动端导航抽屉
          value: true
          help: 关闭后移动端不显示右侧抽屉导航入口。
    - group: footer
      label: 页脚
      formSchema:
        - $formkit: checkbox
          name: enable
          label: 显示页脚
          value: true
          help: 关闭后全站不显示页脚。
        - $formkit: checkbox
          name: show_title
          label: 显示标题
          value: true
        - $formkit: text
          name: title
          label: 标题
          help: 不填写时默认使用站点标题。
        - $formkit: checkbox
          name: show_slogan
          label: 显示说明
          value: true
        - $formkit: textarea
          name: slogan
          label: 页脚说明
          rows: 3
          help: 不填写时默认使用站点副标题。
        - $formkit: checkbox
          name: show_beian
          label: 显示备案信息
          value: true
        - $formkit: checkbox
          name: show_site_time
          label: 显示成书时间
          value: false
        - $formkit: text
          name: site_time_label
          label: 成书时间标题
          value: 成书于
          help: 例如“成书于”“开卷于”。
        - $formkit: text
          name: site_time
          label: 成书时间
          help: 建议填写与全局时间格式一致的日期文本。
    - group: beian
      label: 备案
      formSchema:
        - $formkit: text
          name: icp_text
          label: ICP 备案号
        - $formkit: text
          name: icp_link
          label: ICP 备案链接
          value: https://beian.miit.gov.cn/
        - $formkit: text
          name: gongan_text
          label: 公安备案号
        - $formkit: text
          name: gongan_link
          label: 公安备案链接
          value: https://beian.mps.gov.cn/#/query/webSearch
    - group: plugin
      label: 插件集成
      formSchema:
        - $formkit: group
          name: docsme
          label: Docsme 文档
          value:
            source: theme
          children:
            - $formkit: select
              name: source
              label: 模板来源
              value: theme
              options:
                - label: 使用当前主题样式
                  value: theme
                - label: 使用插件默认模板
                  value: plugin
